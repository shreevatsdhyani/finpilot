services:
  mongo:
    image: mongo:7
    container_name: finpilot-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    networks:
      - finpilot-net

  mongo-express:
    image: mongo-express:1
    container_name: finpilot-mongo-express
    restart: unless-stopped
    ports:
      - "8081:8081"
    environment:
      ME_CONFIG_MONGODB_URL: mongodb://mongo:27017
      ME_CONFIG_BASICAUTH: "false"
    depends_on:
      - mongo
    networks:
      - finpilot-net

volumes:
  mongo_data:

networks:
  finpilot-net:
    driver: bridge
